version: '3.8'

services:
  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: grobid-server
    ports:
      - "8070:8070"
    restart: unless-stopped
    network_mode: "host"

    # Optional: GROBID is memory intensive. 
    # If it crashes while parsing large PDFs, uncomment the limits below.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G